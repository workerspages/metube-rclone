services:
  metube-rclone:
    build: .
    image: metube-rclone:latest
    container_name: metube-rclone
    restart: unless-stopped
    ports:
      - "8081:8081"   # metube Web UI
      - "8080:8080"   # rclone WebDAV
    volumes:
      - ./downloads:/downloads   # 持久化下载目录
    environment:
      # metube 配置
      - DOWNLOAD_DIR=/downloads
      # rclone WebDAV 配置
      - WEBDAV_PORT=8080
      - WEBDAV_USER=admin          # 修改为你的用户名
      - WEBDAV_PASS=admin          # 修改为你的密码
