services:
  metube-rclone:
    build: .
    image: metube-rclone:latest
    container_name: metube-rclone
    restart: unless-stopped
    ports:
      - "8080:8080"   # 唯一对外端口，由 Caddy 统一代理
    volumes:
      - ./downloads:/downloads
    environment:
      - PORT=8080              # Caddy 对外监听端口
      - DOWNLOAD_DIR=/downloads
      - WEBDAV_USER=admin      # 修改为你的用户名
      - WEBDAV_PASS=admin      # 修改为你的密码
