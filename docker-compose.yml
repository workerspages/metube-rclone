services:
  metube-rclone:
    image: ghcr.io/workerspages/metube-rclone:latest
    container_name: metube-rclone
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/downloads
      - ./caddy_data:/data/caddy    # 持久化 Caddy 数据，避免重启后重复申请证书
    environment:
      # Caddy 对外监听端口（本地部署时使用，PaaS 平台由平台自动注入）
      - PORT=8080
      - DOWNLOAD_DIR=/downloads
      # metube Web UI 认证（明文密码，启动时自动哈希）
      - UI_USER=admin             # 修改为你的用户名
      - UI_PASS=changeme          # 修改为你的密码
      # rclone WebDAV 认证
      - WEBDAV_USER=admin         # 修改为你的用户名
      - WEBDAV_PASS=changeme      # 修改为你的密码
      # PaaS HTTPS 域名（本地部署留空即可）
      # - PUBLIC_DOMAIN=metube-rclone.zeabur.app
